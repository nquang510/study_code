<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .form-container{
        width: 500px;
        height: 300px;
        margin: 0 auto;
    }
    .form-group{
        margin: 10px;
    }
    .form-group label{
        font-weight: bold;
        margin-bottom: 5px;
    }
</style>
<body>
    <div class="form-container">
        <form id="login-form" action="https://www.24h.com.vn">
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" placeholder="Nhập username...">
                <small id ="UsernameError"></small>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="Nhập email...">
                <small id ="EmailError"></small>
            </div>
            <button type="submit">Đăng nhập</button>
        </form>
    </div>
    <script>
        const form = document.getElementById("login-form");
        const usernameInput = document.getElementById("username");
        const usernameError = document.getElementById("UsernameError");
        const emailInput = document.getElementById("email");
        const emailError = document.getElementById("EmailError");

        form.addEventListener("submit", function(e){
            e.preventDefault();
            username = usernameInput.value;
            email = emailInput.value;

            emailError.textContent = "";
            usernameError.textContent = "";

            let err= false;

            if(username === ""){
                usernameError.textContent = "Vui lòng nhập username";
                err = true;
            }

            if(email === ""){
                emailError.textContent = "Vui lòng nhập email";
                err = true;
            }
            if(err === false){
                alert("Đăng nhập thành công");
                const objCon = {
                    'xx': username,
                    'yy': email
                };
                let objCha = {};
                let getLocal = localStorage.getItem("objCha")
                if(getLocal){
                    objCha = JSON.parse(getLocal);
                }
                console.log(objCon);
                objCha[username] = objCon;
                let aa = JSON.stringify(objCha);
                localStorage.setItem("objCha",aa);
            }
        });
    </script>
</body>
</html>
