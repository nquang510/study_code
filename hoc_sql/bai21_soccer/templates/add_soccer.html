<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>Danh sách cầu thủ</h2>

    <h3>Thêm cầu thủ</h3>
    <form method='post' action=''>
        <p>
            Tên cầu thủ:<br>
            <input type='text' name='tenCauThu' required>
        </p>

        <p>
            Tuổi:<br>
            <input type='number' name='tuoi' required>
        </p>

        <p>
            Quốc tịch:<br>
            <input type='text' name='quocTich' required>
        </p>

        <p>
            Vị trí:<br>
            <input type='text' name='viTri' required>
        </p>

        <p>
            Lương:<br>
            <input type='number' step="0.01" name='luong' required>
        </p>
        <button type='submit'>Thêm</button>
    </form>

    <hr>
    
    <table border='1' cellpadding='5'>
        <tr>
            <th>ID</th>
            <th>Tên cầu thủ</th>
            <th>Tuổi</th>
            <th>Quốc tịch</th>
            <th>Vị trí</th>
            <th>Lương</th>
        </tr>

        {% for s in soccer %}
        <tr>
            <td>{{ s[0] }}</td>
            <td>{{ s[1] }}</td>
            <td>{{ s[2] }}</td>
            <td>{{ s[3] }}</td>
            <td>{{ s[4] }}</td>
            <td>{{ s[5] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
