<header class="main-header">
    <nav class="navbar">
        <a href="/" class="logo">MyShop</a>
        <ul class="nav-menu">
            {% if session.get('user_id') %}
                <li><a href="{{ url_for('account.account') }}">Account</a></li>
                <li><a href="{{ url_for('logout.logout') }}">Logout</a></li>
            {% else %}
                <li><a href="{{ url_for('login.login') }}">Login</a></li>
                <li><a href="{{ url_for('register.register') }}">Register</a></li>
            {% endif %}
        </ul>
    </nav>
    <style>
        .main-header { background: #764ba2; padding: 14px 24px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; max-width: 1000px; margin: 0 auto; }
        .logo { color: #fff; font-weight: 700; font-size: 20px; text-decoration: none; }
        .nav-menu { list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; }
        .nav-menu a { color: #fff; text-decoration: none; font-weight: 600; font-size: 14px; }
        .nav-menu a:hover { opacity: 0.8; }
    </style>
</header>
