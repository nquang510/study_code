// bai tap 3:
//    - Tao 1 ul va 4 LI, cho mỗi LI 1 class hoặc ID rieng.
//    - Click vao Li có CLASS/ID nao  thi them màu vao cho Li do
        const theLi = document.querySelectorAll("li");
        theLi.forEach(function(li){
            li.addEventListener("click", function(){
            if (this.id == "xx") {
                this.style.backgroundColor = "red";
            } else if (this.id == "yy") {
                this.style.backgroundColor = "blue";
            } else if (this.id == "zz") {
                this.style.backgroundColor = "green";
            } else if (this.id == "ww") {
                this.style.backgroundColor = "yellow";
            }
            })
        })
// tạo 1 button va the p
// viet code click button:
// - lân 1 thi hide p di
// - lan 2 thi show p len
// - lan 3 thi hide p
// - 4 thi show p
        const theButton = document.querySelector("button");
        const theP = document.querySelector("p");
        theButton.onclick = function(){
            if (theP.style.display !== "none") {
                theP.style.display = "none";
            } else {
                theP.style.display = "block";
            }
        }
    </script>
