<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let getLocal = localStorage.getItem("mang1")
        if(getLocal){
            xx = JSON.parse(getLocal)
            console.log(xx);
        }
        var mang3 = []
        for(i=11; i < 21; i++){
            mang3.push(i)
        }
        console.log(mang3);
        const arr = xx.concat(mang3)
        console.log(arr);
        var tong = 0;
        for(i = 0; i < arr.length; i++){
            tong = tong + arr[i]
        }
        console.log(tong);
    </script>
</body>
